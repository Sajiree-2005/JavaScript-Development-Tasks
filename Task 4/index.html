<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false" />
        <button>
          <img
            src="images/search.png"
            alt="Image of a microscope indicating search"
          />
        </button>
        <div class="error">
          <p>Invalid city name</p>
        </div>
      </div>
      <div class="weather">
        <img
          src="images/rain.png"
          class="weather-icon"
          alt="Image of rainfall and clouds"
        />
        <h1 class="temp">22°C</h1>
        <h2 class="city">New York</h2>
        <div class="details">
          <div class="col">
            <img
              src="images/sun.png"
              alt="Image of sun for indicating humidity"
            />
            <div>
              <p class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img
              src="images/wind.png"
              alt="Image of sun for indicating humidity"
            />
            <div>
              <p class="wind">15 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
